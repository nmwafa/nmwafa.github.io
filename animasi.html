<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Star Catcher · Cursor Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0c0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            cursor: none; /* sembunyikan kursor bawaan */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none; /* cegah scroll/gulir saat sentuh (opsional) */
        }

        /* UI overlay — tetap di atas canvas */
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.9);
            pointer-events: none; /* agar klik menembus ke canvas */
            background: rgba(8, 12, 20, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 18px 28px;
            border-radius: 60px;
            border: 1px solid rgba(120, 220, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 30px rgba(0, 180, 255, 0.2);
        }

        .score-container {
            display: flex;
            align-items: baseline;
            gap: 30px;
        }

        .score-box {
            text-align: left;
        }

        .score-label {
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            color: #b3e4ff;
        }

        .score-value {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            color: #fff9e6;
            text-shadow: 0 0 30px #7fd4ff;
        }

        .highscore-value {
            font-size: 2rem;
            font-weight: 600;
            color: #ffec9e;
        }

        .hint {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            color: rgba(220, 240, 255, 0.8);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 20px #004cff;
            font-weight: 400;
            backdrop-filter: blur(4px);
            width: fit-content;
            margin: 0 auto;
            padding: 12px 28px;
            background: rgba(10, 18, 28, 0.4);
            border-radius: 60px;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }

        .hint i {
            font-style: normal;
            display: inline-block;
            animation: pulseGlow 2.2s infinite;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.6; text-shadow: 0 0 5px cyan; }
            50% { opacity: 1; text-shadow: 0 0 20px #00a6ff, 0 0 40px #6200ff; }
            100% { opacity: 0.6; text-shadow: 0 0 5px cyan; }
        }

        /* reset kecil (opsional) */
        .reset-tip {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            color: #aab9d4;
            font-size: 0.8rem;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- UI overlay -->
    <div class="ui-panel">
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">⭐ SCORE</div>
                <div class="score-value" id="scoreDisplay">000</div>
            </div>
            <div class="score-box">
                <div class="score-label">🏆 BEST</div>
                <div class="highscore-value" id="highScoreDisplay">000</div>
            </div>
        </div>
    </div>

    <div class="hint">
        <i>✨ gerakkan kursor — tangkap bintang yang bersinar ✨</i>
    </div>
    <div class="reset-tip">🌀 animasi kursor · partikel reaktif</div>

    <script>
        (function(){
            "use strict";

            // ----- CANVAS & KONTEKS -----
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // ----- ELEMEN UI -----
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');

            // ----- DIMENSI & MOUSE -----
            let width = window.innerWidth;
            let height = window.innerHeight;
            let mouseX = width / 2;
            let mouseY = height / 2;
            let mouseInside = true;      // jika mouse keluar jendela, tidak ada tabrakan
            const CURSOR_RADIUS = 38;     // radius tangkapan & visual

            // ----- GAME STATE -----
            let score = 0;
            let highScore = 0;
            
            // load highscore dari localStorage
            try {
                const saved = localStorage.getItem('starCatcher_high');
                if (saved) highScore = parseInt(saved, 10) || 0;
            } catch(e) { /* abaikan */ }
            highScoreDisplay.textContent = String(highScore).padStart(3, '0');

            // ----- BINTANG (target) -----
            const STAR_COUNT = 24;
            const STAR_BASE_RADIUS = 12;   // radius visual & deteksi
            let stars = [];
            
            // ----- PARTIKEL (efek ledakan saat bintang tertangkap) -----
            let particles = [];
            
            // ----- PARAMETER FISIK BINTANG -----
            const MAX_SPEED = 1.8;
            const FRICTION_AIR = 0.998;     // sedikit melambat agar tidak terlalu liar

            // ----- INISIALISASI BINTANG -----
            function initStars(count) {
                const newStars = [];
                for (let i = 0; i < count; i++) {
                    newStars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 1.6,
                        vy: (Math.random() - 0.5) * 1.6,
                        radius: STAR_BASE_RADIUS,
                    });
                }
                return newStars;
            }

            // ----- FUNGSI RESET POSISI BINTANG (setelah tertangkap) -----
            function resetStar(star) {
                star.x = Math.random() * width;
                star.y = Math.random() * height;
                // beri kecepatan acak baru yang lumayan
                star.vx = (Math.random() - 0.5) * 2.2;
                star.vy = (Math.random() - 0.5) * 2.2;
                // pastikan tidak stuck di luar (koreksi kecil)
                star.x = Math.min(Math.max(star.x, star.radius + 2), width - star.radius - 2);
                star.y = Math.min(Math.max(star.y, star.radius + 2), height - star.radius - 2);
            }

            // ----- MEMBUAT PARTIKEL LEDAKAN (saat bintang tertangkap) -----
            function spawnExplosion(px, py, baseColor = '#FFD966') {
                const count = 14 + Math.floor(Math.random() * 12);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2.5 + Math.random() * 7;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const hue = (Math.random() * 40) + 40; // kuning ke oranye
                    const color = `hsl(${hue}, 95%, 65%)`;
                    particles.push({
                        x: px, y: py,
                        vx: vx, vy: vy,
                        size: 3 + Math.random() * 8,
                        life: 0.9 + Math.random() * 0.6,
                        decay: 0.012 + Math.random() * 0.02,
                        color: color,
                    });
                }
                // tambahan spark biru/putih
                for (let i=0;i<6;i++) {
                    const angle = Math.random()*2*Math.PI;
                    const spd = 4+Math.random()*6;
                    particles.push({
                        x: px, y: py,
                        vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
                        size: 2+Math.random()*5,
                        life: 0.7,
                        decay: 0.018,
                        color: '#B0E0FF'
                    });
                }
            }

            // ----- UPDATE & GAMBAR PARTIKEL -----
            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life -= p.decay;
                    p.size *= 0.99; 
                    
                    if (p.life <= 0.02 || p.size < 0.3 || p.x < -50 || p.x > width+50 || p.y < -50 || p.y > height+50) {
                        particles.splice(i, 1);
                        continue;
                    }
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.globalAlpha = p.life * 0.9;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                }
                // reset shadow & alpha
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            // ----- UPDATE POSISI BINTANG (gerak + pantulan) -----
            function updateStars() {
                for (const s of stars) {
                    // gerak
                    s.x += s.vx;
                    s.y += s.vy;
                    
                    // sedikit gesekan udara agar lebih natural
                    s.vx *= FRICTION_AIR;
                    s.vy *= FRICTION_AIR;
                    
                    // batas kecepatan maksimum
                    const spd = Math.hypot(s.vx, s.vy);
                    if (spd > MAX_SPEED) {
                        s.vx *= MAX_SPEED / spd;
                        s.vy *= MAX_SPEED / spd;
                    }
                    
                    // pantulan tepi (dengan koreksi posisi)
                    const rad = s.radius;
                    if (s.x - rad < 0) {
                        s.x = rad;
                        s.vx *= -0.95;
                    } else if (s.x + rad > width) {
                        s.x = width - rad;
                        s.vx *= -0.95;
                    }
                    
                    if (s.y - rad < 0) {
                        s.y = rad;
                        s.vy *= -0.95;
                    } else if (s.y + rad > height) {
                        s.y = height - rad;
                        s.vy *= -0.95;
                    }
                    
                    // tambahan kecil: mencegah bintang diam total (kalau terlalu lambat beri sentakan)
                    if (Math.abs(s.vx) < 0.2 && Math.abs(s.vy) < 0.2) {
                        s.vx += (Math.random() - 0.5) * 0.3;
                        s.vy += (Math.random() - 0.5) * 0.3;
                    }
                }
            }

            // ----- DETEKSI TABRAKAN MOUSE DENGAN BINTANG -----
            function handleCollisions() {
                if (!mouseInside) return; // mouse diluar jendela → tidak tangkap
                
                for (const s of stars) {
                    const dx = mouseX - s.x;
                    const dy = mouseY - s.y;
                    const dist = Math.hypot(dx, dy);
                    const threshold = s.radius + CURSOR_RADIUS;
                    
                    if (dist < threshold) {
                        // BINTANG TERTANGKAP!
                        score++;
                        updateScoreUI();
                        
                        // efek ledakan partikel di posisi bintang
                        spawnExplosion(s.x, s.y, '#FFB347');
                        
                        // reset bintang ke posisi baru
                        resetStar(s);
                        
                        // tambahan: sedikit efek impuls ke bintang lain? tidak perlu
                        
                        // cek highscore
                        if (score > highScore) {
                            highScore = score;
                            highScoreDisplay.textContent = String(highScore).padStart(3, '0');
                            try {
                                localStorage.setItem('starCatcher_high', highScore);
                            } catch(e) {}
                        }
                    }
                }
            }

            function updateScoreUI() {
                scoreDisplay.textContent = String(score).padStart(3, '0');
            }

            // ----- MENGGAMBAR BINTANG (dengan efek glow) -----
            function drawStars() {
                for (const s of stars) {
                    // efek cahaya utama
                    ctx.shadowColor = '#FFD966';
                    ctx.shadowBlur = 26;
                    
                    // gradien radial untuk tampilan "star"
                    const gradient = ctx.createRadialGradient(
                        s.x - 4, s.y - 4, 2,
                        s.x, s.y, s.radius + 4
                    );
                    gradient.addColorStop(0, '#FFF7B0');
                    gradient.addColorStop(0.5, '#FFC844');
                    gradient.addColorStop(1, '#E09F00');
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    // lapisan kedua: kilau inti
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = '#FFAA33';
                    ctx.beginPath();
                    ctx.arc(s.x-2, s.y-2, s.radius*0.5, 0, Math.PI*2);
                    ctx.fillStyle = '#FFF9E0';
                    ctx.fill();
                    
                    // highlight kecil (mata bintang)
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(s.x-3, s.y-4, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fill();
                }
                // reset shadow
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            }

            // ----- MENGGAMBAR KURSOR CUSTOM (unik, animasi berputar & glow) -----
            let cursorAngle = 0;
            function drawCustomCursor() {
                if (!mouseInside) return;
                
                cursorAngle += 0.018;
                
                const cx = mouseX;
                const cy = mouseY;
                
                // Lingkaran luar semi-transparan dengan efek "magnetik"
                ctx.shadowColor = '#3ac0ff';
                ctx.shadowBlur = 40;
                ctx.beginPath();
                ctx.arc(cx, cy, CURSOR_RADIUS, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(140, 220, 255, 0.65)';
                ctx.lineWidth = 3.5;
                ctx.stroke();
                
                // Lingkaran dalam berdenyut
                ctx.shadowBlur = 35;
                ctx.beginPath();
                ctx.arc(cx, cy, CURSOR_RADIUS * 0.65, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(200, 240, 255, 0.5)';
                ctx.lineWidth = 2.2;
                ctx.stroke();
                
                // Elemen rotasi (seperti "cincin energi")
                ctx.shadowBlur = 28;
                ctx.lineWidth = 2.8;
                ctx.strokeStyle = '#a0dbff';
                ctx.setLineDash([12, 18]);
                ctx.beginPath();
                ctx.arc(cx, cy, CURSOR_RADIUS + 6, cursorAngle, cursorAngle + Math.PI * 1.7);
                ctx.stroke();
                
                ctx.setLineDash([8, 22]);
                ctx.beginPath();
                ctx.arc(cx, cy, CURSOR_RADIUS - 4, -cursorAngle * 1.3, -cursorAngle * 1.3 + Math.PI * 1.5);
                ctx.strokeStyle = '#d4f0ff';
                ctx.stroke();
                
                // reset dash
                ctx.setLineDash([]);
                
                // Titik pusat kursor (seperti inti)
                ctx.shadowBlur = 45;
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, 2*Math.PI);
                ctx.fillStyle = '#e6f7ff';
                ctx.shadowColor = '#0099ff';
                ctx.fill();
                
                // Lingkaran kecil ekstra
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(cx-2, cy-2, 3, 0, 2*Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            }

            // ----- BACKGROUND (efek grid halus + gradien ruang) -----
            function drawBackground() {
                // gradasi dasar
                const grad = ctx.createLinearGradient(0, 0, width*0.6, height);
                grad.addColorStop(0, '#03050b');
                grad.addColorStop(0.7, '#101a28');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                // bintik-bintik statis (efek bintang latar)
                ctx.fillStyle = '#d4e6ff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#7fbfff';
                for (let i=0; i<120; i++) {
                    const sx = (i*131) % width;
                    const sy = (i*237) % height;
                    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(i);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1.2, 0, 2*Math.PI);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            // ----- LOOP ANIMASI UTAMA -----
            function animationLoop() {
                // update posisi bintang (fisika)
                updateStars();
                
                // deteksi tabrakan dengan mouse (tangkap bintang)
                handleCollisions();
                
                // update partikel ledakan
                updateParticles();
                
                // --- RENDER ---
                drawBackground();
                
                // gambar bintang (target)
                drawStars();
                
                // gambar partikel ledakan di atas bintang
                drawParticles();
                
                // gambar kursor kustom (paling atas)
                drawCustomCursor();
                
                requestAnimationFrame(animationLoop);
            }

            // ----- HANDLE RESIZE (responsif) -----
            function handleResize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                // perbaiki posisi bintang agar tidak keluar dari canvas baru
                for (const s of stars) {
                    s.x = Math.min(Math.max(s.x, s.radius), width - s.radius);
                    s.y = Math.min(Math.max(s.y, s.radius), height - s.radius);
                }
                
                // pastikan mouse tidak stuck di luar
                if (mouseX > width) mouseX = width/2;
                if (mouseY > height) mouseY = height/2;
            }

            // ----- EVENT LISTENERS -----
            function onMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mouseInside = true;
            }
            
            function onMouseLeave() {
                mouseInside = false;
            }
            
            function onMouseEnter() {
                mouseInside = true;
            }

            // ----- INISIALISASI AWAL -----
            function init() {
                canvas.width = width;
                canvas.height = height;
                
                stars = initStars(STAR_COUNT);
                particles = [];
                score = 0;
                updateScoreUI();
                highScoreDisplay.textContent = String(highScore).padStart(3, '0');
                
                // posisi mouse awal
                mouseX = width/2;
                mouseY = height/2;
                mouseInside = true;
                
                // event
                window.addEventListener('resize', handleResize);
                canvas.addEventListener('mousemove', onMouseMove);
                canvas.addEventListener('mouseleave', onMouseLeave);
                canvas.addEventListener('mouseenter', onMouseEnter);
                
                // mulai animasi
                animationLoop();
            }

            // Jalankan!
            init();

            // Bersihkan listener jika diperlukan (tapi halaman statis, tidak perlu)
            window.addEventListener('beforeunload', function() {
                // simpan highscore terakhir (sudah tersimpan saat update)
            });

        })();
    </script>
</body>
</html>
