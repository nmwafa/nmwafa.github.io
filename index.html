<html>
  <head>
    <style>
      /* Importing fonts from Google */
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap");

      /* Reseting */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f4f7f7;
      }

      .wrapper {
        max-width: 350px;
        min-height: 450px;
        margin: 90px auto;
        padding: 40px 30px 40px 30px;
        background-color: #ebf6ff;
        border-radius: 25px;
        box-shadow: 13px 13px 20px #cbced1, -13px -13px 20px #fff;
      }

      .logo {
        width: 80px;
        margin: auto;
        margin-top: -70;
        margin-bottom: 50;
      }

      .logo img {
        width: 100%;
        height: 80px;
        object-fit: cover;
        border-radius: 50%;
        box-shadow: 0px 0px 3px #5f5f5f, 0px 0px 0px 5px #ecf0f3,
          8px 8px 15px #a7aaa7, -8px -8px 15px #fff;
      }

      .wrapper .name {
        font-weight: 606;
        font-size: 1.4rem;
        letter-spacing: 1.3px;
        text-align: center;
        color: #727272;
        margin-top: -20;
        margin-bottom: 40;
      }

      .wrapper .form-field input {
        width: 100%;
        display: block;
        border: none;
        outline: none;
        background: none;
        font-size: 1.2rem;
        color: #919191;
        padding: 10px 15px 10px 10px;
        /* border: 1px solid red; */
      }

      .wrapper .form-field {
        padding-left: 10px;
        margin-bottom: 20px;
        border-radius: 25px;
        box-shadow: inset 8px 8px 8px #dddada, inset -8px -8px 8px #ffffff;
      }

      .wrapper .form-field .fas {
        color: #555;
      }

      .wrapper .btn {
        box-shadow: none;
        width: 100%;
        height: 40px;
        border: none;
        background-color: #03a9f4;
        color: #ffffff;
        border-radius: 25px;
        box-shadow: 3px 3px 3px #cacaca, -3px -3px 3px #fff;
        letter-spacing: 1.3px;
      }

      .wrapper .btn:hover {
        background-color: #028cd1;
        cursor: pointer;
      }

      .wrapper .text-center {
        text-align: center;
        margin-top: 15;
        margin-bottom: -20;
      }

      .wrapper .text-center a {
        text-decoration: none;
        font-size: 0.8rem;
        color: #03a9f4;
      }

      .wrapper a:hover {
        color: #039be5;
      }

      @media (max-width: 380px) {
        .wrapper {
          margin: 30px 20px;
          padding: 40px 15px 15px 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="logo">
        <img src="rp.png" alt="">
      </div>
      <div class="name">Welcome To<br>Ruang Program</div>
      <form class="p-3 mt-3">
        <div class="form-field d-flex align-items-center">
          <span class="far fa-user"></span>
          <input
            type="text"
            name="userName"
            id="userName"
            placeholder="Username"
          />
        </div>
        <div class="form-field d-flex align-items-center">
          <span class="fas fa-key"></span>
          <input
            type="password"
            name="password"
            id="pwd"
            placeholder="Password"
          />
        </div>
        <button class="btn mt-3">Sign In</button>
      </form>
      <div class="text-center">
        <a href="#">Forget password?</a> or <a href="#">Sign up</a>
      </div>
    </div>
  </body>
</html>
